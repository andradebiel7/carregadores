name: Monitoramento Tupi Network

on:
  schedule:
    - cron: '*/5 * * * *'  # Executa a cada 5 minutos
  workflow_dispatch:      # Permite execução manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar script de monitoramento
      run: python main.py

    - name: Commit e Push do Histórico
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add historico_tupi.csv index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Status & Dashboard [$(date)]" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
