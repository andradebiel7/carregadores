name: Monitoramento Tupi Network

on:
  schedule:
    - cron: '*/5 * * * *' # Executa a cada 5 minutos
  workflow_dispatch: # Permite execução manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas pytz

      - name: Run monitoring script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "andradebiel7"
          git config --global user.email "andradebiel7@users.noreply.github.com"
          git add historico_tupi.csv index.html
          git commit -m "Auto-update monitoring data [skip ci]" || echo "No changes to commit"
          git push
